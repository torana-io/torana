name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to publish, for example v0.1.7'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Publish to Maven Central
        env:
          CENTRAL_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./mvnw -B -e deploy -P release

      - name: Publish summary
        if: success()
        run: |
          echo "## Manual Publish Succeeded" >> $GITHUB_STEP_SUMMARY
          echo "Published ref ${{ inputs.ref }} to Maven Central." >> $GITHUB_STEP_SUMMARY

      - name: Publish failure summary
        if: failure()
        run: |
          echo "## Manual Publish Failed" >> $GITHUB_STEP_SUMMARY
          echo "Failed to publish ref ${{ inputs.ref }}." >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
