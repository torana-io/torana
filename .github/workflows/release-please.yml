name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify CI passed
        uses: actions/github-script@v7
        with:
          script: |
            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
            const maxAttempts = 40;
            const delayMs = 30000;
            let buildCheck;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data: checkRuns } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.sha,
                check_name: 'build'
              });

              buildCheck = checkRuns.check_runs.find(run => run.name === 'build');

              if (!buildCheck) {
                console.log(`Attempt ${attempt}/${maxAttempts}: build check not found yet.`);
              } else if (buildCheck.status !== 'completed') {
                console.log(
                  `Attempt ${attempt}/${maxAttempts}: build check status is ${buildCheck.status}. Waiting...`
                );
              } else if (buildCheck.conclusion === 'success') {
                console.log('CI build check passed. Proceeding with release.');
                return;
              } else {
                core.setFailed(
                  `CI build check completed with conclusion: ${buildCheck.conclusion}. Aborting release.`
                );
                return;
              }

              if (attempt < maxAttempts) {
                await sleep(delayMs);
              }
            }

            core.setFailed('Timed out waiting for the CI build check to complete.');

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Publish to Maven Central
        env:
          CENTRAL_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./mvnw -B -e deploy -P release

      - name: Publish summary
        if: success()
        run: |
          echo "## Release Published" >> $GITHUB_STEP_SUMMARY
          echo "Successfully published ${{ needs.release-please.outputs.tag_name }} to Maven Central." >> $GITHUB_STEP_SUMMARY

      - name: Publish failure summary
        if: failure()
        run: |
          echo "## Release Failed" >> $GITHUB_STEP_SUMMARY
          echo "Failed to publish ${{ needs.release-please.outputs.tag_name }}." >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
