name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./mvnw -B -e --fail-at-end verify --file pom.xml

      - name: Test Summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: '**/target/surefire-reports/*.xml'

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: '**/target/site/jacoco/jacoco.xml'
          fail_ci_if_error: false

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/target/surefire-reports/*.xml'

  quality:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven

      - name: Run code quality checks
        run: ./mvnw -B -e verify -P quality -DskipTests --file pom.xml

      - name: Quality check summary
        if: failure()
        run: |
          echo "## Quality Check Failed" >> $GITHUB_STEP_SUMMARY
          echo "Review the logs above for details on quality violations." >> $GITHUB_STEP_SUMMARY

  integration-tests:
    runs-on: ubuntu-latest
    needs: [build, quality]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: torana_test
          POSTGRES_USER: torana
          POSTGRES_PASSWORD: torana
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: torana_test
          MYSQL_ROOT_PASSWORD: torana
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven

      - name: Run Integration Tests
        run: ./mvnw -B -e --fail-at-end verify -P integration-tests --file pom.xml

      - name: Integration Test Summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: '**/target/failsafe-reports/TEST-*.xml'

      - name: Upload integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            **/target/failsafe-reports/
          retention-days: 7
