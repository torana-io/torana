version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      spring:
        patterns:
          - "org.springframework*"
      testing:
        patterns:
          - "org.junit*"
          - "org.mockito*"
          - "org.assertj*"
          - "org.testcontainers*"
      jackson:
        patterns:
          - "com.fasterxml.jackson*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
